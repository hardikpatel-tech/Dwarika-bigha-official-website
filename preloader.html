<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwarika bigha official</title>
    <style>
        /* पूरे पेज का स्टाइल */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f8ff; /* हल्का नीला आसमान */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .village-loader {
            text-align: center;
            position: relative;
        }

        /* घर का डिजाइन (SVG) */
        .house-svg {
            width: 150px;
            height: auto;
            animation: houseBounce 1.5s ease-in-out infinite;
        }

        /* घर के ऊपर-नीचे होने का एनिमेशन */
        @keyframes houseBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* लोडिंग टेक्स्ट */
        .loading-box {
            margin-top: 20px;
        }

        .village-text {
            color: #2d5a27; /* गहरा हरा रंग */
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        /* लोडिंग बार */
        .progress-container {
            width: 250px;
            height: 10px;
            background-color: #ddd;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid #2d5a27;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            border-radius: 10px;
            animation: grow 3s linear infinite;
        }

        @keyframes grow {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* नीचे की ज़मीन (हरियाली) */
        .ground {
            position: absolute;
            bottom: -30px;
            width: 300px;
            height: 20px;
            background-color: #8bc34a;
            border-radius: 50%;
            filter: blur(5px);
            z-index: -1;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <div class="village-loader">
        <svg class="house-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 50 L50 10 L90 50 Z" fill="#b22222" stroke="#333" stroke-width="2"/>
            <rect x="20" y="50" width="60" height="40" fill="#ffeb3b" stroke="#333" stroke-width="2"/>
            <rect x="42" y="65" width="16" height="25" fill="#5d4037" />
            <rect x="28" y="58" width="10" height="10" fill="#81d4fa" stroke="#333" stroke-width="1"/>
            <rect x="62" y="58" width="10" height="10" fill="#81d4fa" stroke="#333" stroke-width="1"/>
            <circle cx="70" cy="20" r="5" fill="#ccc" opacity="0.8">
                <animate attributeName="cy" from="20" to="0" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite" />
            </circle>
        </svg>

        <div class="loading-box">
            <div class="village-text">Loading...</div>
            <div class="village-text">Welcome to Dwarika bigha official website</div>  
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
        
        <div class="ground"></div>
    </div>

</body>
</html>
